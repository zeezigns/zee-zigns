<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | AA-Burgers</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/account.css">
</head>
<body class="page-fade-in dashboard-bg">

  <header class="dash-header">
    <div class="header-container">
      <a href="/" class="logo">
        <span class="logo-text">AA-Burgers</span>
      </a>
      <div class="header-right">
        <a href="/" class="btn-primary">Browse Menu</a>
        <button id="logout-btn" class="btn-accent">Log Out</button>
      </div>
    </div>
  </header>

  <main class="dash-container">
    <h1 class="dash-title">My Dashboard</h1>

    <div class="dash-grid">
      <!-- Account Details -->
      <section class="dash-card">
        <h2>Account Details</h2>
        
        <div class="details-list">
          <!-- Email (Static) -->
          <div class="detail-row">
            <span class="detail-label">Email Address</span>
            <span class="detail-value" id="display-email"></span>
            <!-- No edit button for email -->
          </div>

          <!-- Name -->
          <div class="detail-row editable-row" data-field="name">
            <span class="detail-label">Full Name</span>
            <div class="value-container">
              <span class="detail-value" id="display-name"></span>
              <input type="text" class="detail-input hidden" id="input-name">
            </div>
            <div class="action-container">
              <button class="edit-btn text-primary">Edit</button>
              <div class="save-actions hidden">
                <button class="save-btn text-success">Save</button>
                <button class="cancel-btn text-danger">Cancel</button>
              </div>
            </div>
          </div>

          <!-- Phone -->
          <div class="detail-row editable-row" data-field="phone">
            <span class="detail-label">Phone Number</span>
            <div class="value-container">
              <span class="detail-value" id="display-phone"></span>
              <input type="text" class="detail-input hidden" id="input-phone" pattern="\\d{10,11}">
            </div>
            <div class="action-container">
              <button class="edit-btn text-primary">Edit</button>
              <div class="save-actions hidden">
                <button class="save-btn text-success">Save</button>
                <button class="cancel-btn text-danger">Cancel</button>
              </div>
            </div>
          </div>

          <!-- Address -->
          <div class="detail-row editable-row" data-field="address">
            <span class="detail-label">Delivery Address</span>
            <div class="value-container">
              <span class="detail-value" id="display-address"></span>
              <textarea class="detail-input hidden" id="input-address" rows="2"></textarea>
            </div>
            <div class="action-container">
              <button class="edit-btn text-primary">Edit</button>
              <div class="save-actions hidden">
                <button class="save-btn text-success">Save</button>
                <button class="cancel-btn text-danger">Cancel</button>
              </div>
            </div>
          </div>

        </div>
      </section>

      <!-- Order History -->
      <section class="dash-card">
        <h2>Order History</h2>
        
        <div id="orders-container" class="orders-list">
          <div class="orders-skeleton">
            <div class="skeleton-line skeleton"></div>
            <div class="skeleton-line skeleton"></div>
            <div class="skeleton-line skeleton"></div>
          </div>
        </div>
      </section>
    </div>

  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Changes saved!</div>

  <script src="/js/account.js"></script>
</body>
</html>
